services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram_shop_bot
    env_file:
      - .env
    environment:
      # Override database host for Docker network
      POSTGRES_HOST: ${DB_HOST}
      # Redis configuration - using external Redis Cloud from .env
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Monitoring configuration
      MONITORING_HOST: 0.0.0.0
      MONITORING_PORT: 9090
      # Logging configuration
      LOG_TO_STDOUT: 1
      LOG_TO_FILE: 1
    ports:
      - "9090:9090"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./btc_addresses.txt:/app/btc_addresses.txt:rw
      - ./eth_addresses.txt:/app/eth_addresses.txt:rw
      - ./ltc_addresses.txt:/app/ltc_addresses.txt:rw
      - ./sol_addresses.txt:/app/sol_addresses.txt:rw
      - ./trx_addresses.txt:/app/trx_addresses.txt:rw
      # depends_on:
      # db:
      # condition: service_healthy
      # # Removed redis dependency - using external Redis Cloud
      # # If using local Redis, uncomment:
      # # redis:
      # #   condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9090/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bot_network

networks:
  bot_network:
    name: legendsnet
    external: true
